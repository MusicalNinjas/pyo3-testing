name: Deploy Rust
concurrency: Crates.io

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  quality-check:
    uses: ./.github/workflows/quality.yml

  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
    - uses: actions/checkout@v6
    - name: install jaq
      uses: taiki-e/install-action@v2.81.11
      with:
        tool: jaq
    - id: version
      name: get version
      run: echo "version=v$(jaq -cr .package.version Cargo.toml)" >> $GITHUB_OUTPUT

  publish_lib:
    needs:
      - version
      - quality-check
    if: ${{ !(failure() || cancelled()) }}
    environment: crates.io
    permissions:
      id-token: write
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    # Install manually as different crates may have custom toolchains defined
    - name: install rust
      run: rustup set profile default && rustup install
    # Use OIDC for updating existing crates
    - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe #v1.0.4
      id: auth
    - name: Publish
      env:
        CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      run:
        cargo publish

  github_release:
    env:
      GH_TOKEN: ${{ github.token }}
    permissions:
      attestations: write
      contents: write
    needs:
      - version
      - publish_lib
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: publish release
        run: gh release create ${{ needs.version.outputs.version }} --generate-notes
